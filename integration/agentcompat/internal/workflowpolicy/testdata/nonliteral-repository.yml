on:
  pull_request:
concurrency: policy
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ inputs.repository }}
          ref: 0123456789abcdef0123456789abcdef01234567
          persist-credentials: false
